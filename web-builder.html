    <title>MT | Web Builder</title>
   
    <style>
      * {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

a {
  text-decoration: none;
}

html,
body {
  height: 100%;
  overflow: hidden;
}

body {
  font-family:
    "Inter",
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Roboto,
    "Helvetica Neue",
    Arial,
    sans-serif;
  display: flex;
  flex-direction: column;
  background: #f5f5f5;
}

/* Banner styles */
.floating-banner {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
  z-index: 1000;
  animation: slideIn 0.3s ease-out;
  display: flex;
  align-items: center;
  will-change: transform, opacity;
}

@keyframes slideIn {
  from {
    transform: translateY(100px) translateZ(0);
    opacity: 0;
  }
  to {
    transform: translateY(0) translateZ(0);
    opacity: 1;
  }
}

.floating-banner.dismissed {
  animation: slideOut 0.3s ease-out forwards;
}

@keyframes slideOut {
  to {
    transform: translateY(100px) translateZ(0);
    opacity: 0;
  }
}

.banner-padding {
  padding: 10px 16px;
}

.banner-link-wrapper {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  cursor: pointer;
}

.banner-logo {
  display: flex;
  align-items: center;
  color: #2d2d2d;
  flex-shrink: 0;
}

.banner-logo svg {
  height: 28px;
  width: auto;
}

.banner-text-container {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.banner-text {
  margin: 0;
  white-space: nowrap;
}

.banner-upper-text {
  color: #151617;
  font-size: 14px;
}

.banner-lower-text {
  color: #878c9f;
  font-size: 10px;
}

.banner-action-container {
  border-left: 1px solid rgba(45, 47, 53, 0.08);
  display: flex;
  align-items: center;
  gap: 10px;
  align-self: stretch;
}

.action-btn {
  display: flex;
  align-items: center;
  justify-content: center;
  background: none;
  border: none;
  color: #999;
  cursor: pointer;
  transition: color 0.2s;
  flex-shrink: 0;
}

.action-btn:hover {
  color: #2d2d2d;
}

/* Iframe container styles */
.iframe-container {
  flex: 1;
  position: relative;
  background: white;
  overflow: hidden;
  min-height: 0;
}

iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

    <div class="iframe-container">
      <iframe
        id="preview-iframe"
         src="https://019da0f4-4789-7621-8505-a5ab0bdc5c35.arena.site/?embed=true"
        sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-orientation-lock allow-pointer-lock allow-presentation allow-popups allow-popups-to-escape-sandbox allow-downloads allow-top-navigation-by-user-activation"
        allow="

    <script>
      const iframe = document.getElementById("preview-iframe");
      iframe.addEventListener("load", () => iframe.focus());

      document.addEventListener("DOMContentLoaded", () => {
        if (!hasStorageKey("code_reported") || !hasStorageKey("survey_completed")) {
          document.querySelector(".report-content-btn").style.display = "block";
        }
      });

      function onCodePreviewBannerCTAClicked(event) {
        posthog?.capture?.("code_preview_banner_cta_clicked");
      }

      function reportContent(event) {
        event.preventDefault();
        event.stopPropagation();
        if (!posthog || !posthog.capture || !posthog.setPersonProperties || !posthog.displaySurvey) return;

        if (!hasStorageKey("survey_completed")) {
          posthog.setPersonProperties?.({
            last_reported_message_id: MESSAGE_ID,
            last_report_timestamp: Date.now(),
          });
          posthog.displaySurvey?.(REPORT_SURVEY_ID, {
            ignoreConditions: true,
            ignoreDelay: true,
          });
        }
      }

      function dismissBanner(event) {
        event.preventDefault();
        event.stopPropagation();
        posthog?.capture?.("code_preview_banner_dismiss");

        const banner = document.getElementById("floating-banner");
        banner.classList.add("dismissed");
        setTimeout(() => banner.remove(), 300);
      }
    </script>
