<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Console • Encoded Reveal</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --border: #1e1e2e;
            --text: #c8c8d4;
            --accent: #00e5a0;
            --accent-glow: #00e5a066;
            --red: #ff4757;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI','SF Pro Display','Inter',system-ui,sans-serif;
            background:var(--bg); color:var(--text);
            height:100vh; width:100vw; overflow:hidden;
            display:flex; align-items:center; justify-content:center;
            user-select:none;
        }
        body::before {
            content:''; position:fixed; inset:0;
            background:
                linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.015) 1px,transparent 1px);
            background-size:40px 40px;
            animation:gridShift 20s linear infinite;
            pointer-events:none; z-index:0;
        }
        @keyframes gridShift {
            0%{background-position:0 0,0 0;} 100%{background-position:40px 40px,40px 40px;}
        }
        .particles { position:fixed; inset:0; pointer-events:none; z-index:0; }
        .particle {
            position:absolute; border-radius:50%; background:var(--accent); opacity:0;
            animation:floatUp 6s ease-in infinite;
        }
        @keyframes floatUp {
            0%{opacity:0;transform:translateY(100vh) scale(0);}
            10%{opacity:0.6;} 30%{opacity:0.2;}
            100%{opacity:0;transform:translateY(-10vh) scale(1.5);}
        }
        .initial-container, .code-container {
            position:relative; z-index:10; display:flex; flex-direction:column; align-items:center;
            gap:28px; transition:all 0.6s cubic-bezier(0.4,0,0.2,1); opacity:1; transform:translateY(0);
            pointer-events:all;
        }
        .initial-container.fade-out, .code-container.fade-out {
            opacity:0; transform:translateY(-30px); pointer-events:none;
        }
        .code-container { display:none; width:90%; max-width:900px; gap:20px; }
        .code-container.active { display:flex; }
        .btn-wrapper { position:relative; }
        .btn-wrapper::before {
            content:''; position:absolute; width:180px; height:180px; border-radius:50%;
            border:1px solid var(--accent-glow); animation:ringPulse 2.5s ease-in-out infinite;
            pointer-events:none; left:50%; top:50%; transform:translate(-50%,-50%);
        }
        @keyframes ringPulse {
            0%,100%{transform:translate(-50%,-50%) scale(1);opacity:0.3;}
            50%{transform:translate(-50%,-50%) scale(1.25);opacity:0.7;}
        }
        .get-api-btn {
            position:relative; z-index:2; padding:18px 48px; font-size:1.1rem; font-weight:700;
            letter-spacing:0.06em; text-transform:uppercase; color:#0a0a0f; background:var(--accent);
            border:none; border-radius:50px; cursor:pointer; transition:all 0.35s ease;
            box-shadow:0 0 40px var(--accent-glow),0 0 80px rgba(0,229,160,0.2); font-family:inherit;
        }
        .get-api-btn:hover { transform:translateY(-2px); box-shadow:0 0 60px var(--accent-glow),0 0 120px rgba(0,229,160,0.35); }
        .get-api-btn:active { transform:scale(0.95); }
        .get-api-btn.clicked {
            background:var(--surface); color:var(--accent); pointer-events:none;
            box-shadow:0 0 0 2px var(--accent),0 0 30px var(--accent-glow);
        }
        .name-section {
            display:flex; flex-direction:column; align-items:center; gap:14px;
            max-height:0; opacity:0; overflow:hidden; transition:all 0.5s ease; pointer-events:none;
        }
        .name-section.visible { max-height:200px; opacity:1; pointer-events:all; }
        .name-label { font-size:0.85rem; letter-spacing:0.08em; text-transform:uppercase; color:#8888a0; }
        .name-input-row { display:flex; gap:10px; align-items:center; }
        .name-input {
            padding:13px 20px; font-size:1rem; border-radius:30px; border:2px solid var(--border);
            background:var(--surface); color:#fff; outline:none; width:240px; transition:all 0.3s ease;
            font-family:inherit;
        }
        .name-input:focus { border-color:var(--accent); box-shadow:0 0 25px var(--accent-glow); }
        .submit-btn {
            padding:13px 26px; font-size:0.9rem; font-weight:600; letter-spacing:0.05em;
            text-transform:uppercase; border-radius:30px; border:2px solid var(--accent);
            background:transparent; color:var(--accent); cursor:pointer; font-family:inherit;
        }
        .submit-btn:hover { background:var(--accent); color:#0a0a0f; }
        .loading-dots { display:none; gap:6px; align-items:center; }
        .loading-dots.active { display:flex; }
        .loading-dots span {
            width:8px; height:8px; border-radius:50%; background:var(--accent);
            animation:dotBounce 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2){ animation-delay:0.2s; }
        .loading-dots span:nth-child(3){ animation-delay:0.4s; }
        @keyframes dotBounce {
            0%,80%,100%{transform:translateY(0);opacity:0.3;} 40%{transform:translateY(-16px);opacity:1;}
        }
        .code-box {
            width:100%; background:var(--surface); border:1px solid var(--border);
            border-radius:12px; overflow:hidden; box-shadow:0 8px 30px rgba(0,0,0,0.5);
        }
        .code-header {
            display:flex; justify-content:space-between; align-items:center;
            padding:12px 16px; background:#1a1a24; border-bottom:1px solid var(--border);
        }
        .code-header span { font-size:0.8rem; letter-spacing:0.05em; color:#aaa; font-weight:600; }
        .copy-btn {
            background:var(--accent); color:#0a0a0f; border:none; padding:6px 16px;
            border-radius:20px; font-weight:600; font-size:0.75rem; cursor:pointer;
            font-family:inherit; letter-spacing:0.04em; transition:all 0.2s;
        }
        .copy-btn:hover { background:#00f0a8; box-shadow:0 0 12px var(--accent-glow); }
        .copy-btn.copied { background:#444; color:#fff; pointer-events:none; }
        pre {
            margin:0; padding:20px; overflow-x:auto; background:#0d0d12; color:#e0e0e0;
            font-family:'Fira Code','Cascadia Code','JetBrains Mono',monospace;
            font-size:0.8rem; line-height:1.6; white-space:pre-wrap; word-break:break-word;
        }
        .back-btn {
            background:transparent; color:#ccc; border:1px solid rgba(255,255,255,0.2);
            padding:8px 22px; border-radius:20px; font-size:0.8rem; cursor:pointer;
            letter-spacing:0.04em; transition:all 0.3s; font-family:inherit;
        }
        .back-btn:hover { background:rgba(255,255,255,0.08); color:#fff; }
        .toast {
            position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(100px);
            background:var(--surface); color:var(--accent); padding:12px 24px; border-radius:30px;
            font-size:0.85rem; z-index:300; opacity:0; transition:all 0.4s ease; pointer-events:none;
            border:1px solid var(--border);
        }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>

    <div class="particles" id="particles"></div>

    <!-- Initial UI -->
    <div class="initial-container" id="initialContainer">
        <div class="btn-wrapper">
            <button class="get-api-btn" id="getApiBtn">GET API</button>
        </div>
        <div class="name-section" id="nameSection">
            <span class="name-label">Enter your identifier</span>
            <div class="name-input-row">
                <input type="text" class="name-input" id="nameInput" placeholder="Write your name..." maxlength="40" autocomplete="off">
                <button class="submit-btn" id="submitBtn">Access</button>
            </div>
            <div class="loading-dots" id="loadingDots">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>

    <!-- Code Display -->
    <div class="code-container" id="codeContainer">
        <div class="code-box">
            <div class="code-header">
                <span>📄 Self-decoding HTML (link hidden)</span>
                <button class="copy-btn" id="copyBtn">📋 Copy Code</button>
            </div>
            <pre><code id="codeBlock"></code></pre>
        </div>
        <button class="back-btn" id="backBtnFromCode">← Back to Start</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ---- SELF-DECODING OUTPUT CODE ----
        const outputCode = `<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MT OK</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="frm" allowfullscreen></iframe>

<script>
    function getQueryParam(param) {
        const urlParams = new URLSearchParams(window.location.search);
        return urlParams.get(param);
    }

    const token = (getQueryParam('token') || "mt")
        .toLowerCase()
        .replace(/[^a-z]/g, '');

    var _ = getQueryParam('url') || "enter your token url";

    function appendToken(url, tkn) {
        let numericSuffix = "";

        for (let i = 0; i < tkn.length; i++) {
            let code = tkn.charCodeAt(i) - 97; // a=0 ... z=25
            numericSuffix += code;
        }

        return url + numericSuffix;
    }

    _ = appendToken(_, token);

    (function () {

        let tokenNumbersLength = "";

        for (let i = 0; i < token.length; i++) {
            tokenNumbersLength += (token.charCodeAt(i) - 97).toString();
        }

        if (_.endsWith(tokenNumbersLength)) {
            _ = _.slice(0, -tokenNumbersLength.length);
        }

        var d = '',
            i = 0,
            ch;

        while (i < _.length) {

            ch = _[i];

            if (/[a-j]/.test(ch)) {

                d += {
                    a: '0',
                    b: '1',
                    c: '2',
                    d: '3',
                    e: '4',
                    f: '5',
                    g: '6',
                    h: '7',
                    i: '8',
                    j: '9'
                }[ch];

                i++;

            } else if (/[0-9]/.test(ch)) {

                if (i + 1 < _.length && /[0-9]/.test(_[i + 1])) {

                    var n = parseInt(_.substr(i, 2), 10);
                    d += String.fromCharCode(97 + n);
                    i += 2;

                } else {

                    d += String.fromCharCode(97 + parseInt(ch, 10));
                    i++;
                }

            } else {

                d += ch;
                i++;
            }
        }

        document.getElementById('frm').src = d;
    })();
<\/script>

</body>
</html>
`;

        // DOM elements
        const initialContainer = document.getElementById('initialContainer');
        const getApiBtn = document.getElementById('getApiBtn');
        const nameSection = document.getElementById('nameSection');
        const nameInput = document.getElementById('nameInput');
        const submitBtn = document.getElementById('submitBtn');
        const loadingDots = document.getElementById('loadingDots');
        const codeContainer = document.getElementById('codeContainer');
        const codeBlock = document.getElementById('codeBlock');
        const copyBtn = document.getElementById('copyBtn');
        const backBtnFromCode = document.getElementById('backBtnFromCode');
        const toast = document.getElementById('toast');

        codeBlock.textContent = outputCode;

        // Particles
        (function createParticles(){
            const c = document.getElementById('particles');
            for(let i=0;i<30;i++){
                const p = document.createElement('div');
                p.className='particle';
                p.style.width=(Math.random()*3+1.5)+'px';
                p.style.height=p.style.width;
                p.style.left=Math.random()*100+'%';
                p.style.animationDuration=(Math.random()*8+5)+'s';
                p.style.animationDelay=Math.random()*7+'s';
                c.appendChild(p);
            }
        })();

        function showToast(msg,d=2200){
            toast.textContent=msg; toast.classList.add('show');
            clearTimeout(toast._t); toast._t=setTimeout(()=>toast.classList.remove('show'),d);
        }

        // GET API button
        let apiClicked=false;
        getApiBtn.addEventListener('click',()=>{
            if(apiClicked) return;
            apiClicked=true;
            getApiBtn.classList.add('clicked');
            getApiBtn.textContent='● ACTIVE';
            setTimeout(()=>{
                nameSection.classList.add('visible');
                setTimeout(()=>nameInput.focus(),400);
            },350);
            setTimeout(()=>showToast('Identifikasi diperlukan untuk melanjutkan'),500);
        });

        function handleSubmit(){
            const name=nameInput.value.trim();
            if(name.length<1){
                showToast('Silakan tulis nama Anda terlebih dahulu');
                nameInput.style.borderColor='var(--red)';
                nameInput.style.boxShadow='0 0 20px #ff475744';
                setTimeout(()=>{
                    nameInput.style.borderColor='var(--border)';
                    nameInput.style.boxShadow='none';
                },1200);
                return;
            }
            submitBtn.style.display='none';
            loadingDots.classList.add('active');
            nameInput.disabled=true;
            nameInput.style.opacity='0.5';
            setTimeout(()=>{
                initialContainer.classList.add('fade-out');
                codeContainer.classList.add('active');
                setTimeout(()=>{ initialContainer.style.display='none'; },600);
                showToast('✅ Encoded code ready — welcome, '+name);
            },1400+Math.random()*600);
        }

        submitBtn.addEventListener('click',handleSubmit);
        nameInput.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); handleSubmit(); } });

        copyBtn.addEventListener('click',()=>{
            navigator.clipboard.writeText(outputCode).then(()=>{
                copyBtn.textContent='✓ Copied!';
                copyBtn.classList.add('copied');
                showToast('📋 Code copied to clipboard');
                setTimeout(()=>{
                    copyBtn.textContent='📋 Copy Code';
                    copyBtn.classList.remove('copied');
                },2500);
            }).catch(()=>showToast('❌ Copy failed. Select manually.'));
        });

        function resetAll(){
            codeContainer.classList.remove('active');
            initialContainer.style.display='flex';
            setTimeout(()=>{
                initialContainer.classList.remove('fade-out');
                nameSection.classList.remove('visible');
                nameInput.value=''; nameInput.disabled=false; nameInput.style.opacity='1';
                submitBtn.style.display=''; loadingDots.classList.remove('active');
                getApiBtn.classList.remove('clicked'); getApiBtn.textContent='GET API';
                apiClicked=false; showToast('Sesi direset');
            },500);
        }

        backBtnFromCode.addEventListener('click',resetAll);
        document.addEventListener('keydown',e=>{ if(e.key==='Escape'&&codeContainer.classList.contains('active')) resetAll(); });
    </script>
</body>
</html>
