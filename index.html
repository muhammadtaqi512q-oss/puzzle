
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Puzzle Game – Modern Version</title>
<style>
body{
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background:#1a1a2e;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    margin:0;
    color:#fff;
}
.game-container{
    background:linear-gradient(145deg,#162447,#1f4068);
    padding:30px;
    border-radius:20px;
    width:90%;
    max-width:600px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,.5);
    position:relative;
    overflow:hidden;
}
h1{color:#e43f5a;text-shadow:1px 1px 5px #000;}
.stage-info{font-size:1.2em;font-weight:bold;margin-bottom:10px;}
.timer{
    color:#ffda79;
    border:2px solid #ffda79;
    padding:8px 15px;
    border-radius:8px;
    display:inline-block;
    margin-bottom:20px;
    font-weight:bold;
}
.question-text{
    font-size:1.5em;
    margin-bottom:25px;
    animation:fadeIn 1s ease;
}
.option-button{
    padding:15px;
    font-size:1.1em;
    border:none;
    border-radius:12px;
    background:#ff6b6b;
    margin:8px 0;
    cursor:pointer;
    font-weight:bold;
    color:#fff;
    transition:0.3s all;
    width:80%;
}
.option-button:hover:not(:disabled){
    transform:scale(1.05);
    background:#ff4757;
}
.feedback{
    margin-top:15px;
    font-size:1.4em;
    display:none;
}
.correct{color:#2ed573;}
.incorrect{color:#ff4757;}
.hidden{display:none;}
.download-btn{
    margin-top:20px;
    padding:12px 20px;
    font-size:1.1em;
    border:none;
    border-radius:12px;
    background:#1dd1a1;
    cursor:pointer;
    font-weight:bold;
    color:#fff;
    transition:0.3s all;
}
.download-btn:hover{
    transform:scale(1.05);
    background:#10ac84;
}
@keyframes fadeIn{
    from{opacity:0; transform: translateY(-10px);}
    to{opacity:1; transform: translateY(0);}
}
</style>
</head>
<body>

<!-- AUDIO ELEMENTS -->
<audio id="bgMusic" src="https://www.bensound.com/bensound-music/bensound-summer.mp3" loop autoplay></audio>
<audio id="correctSound" src="https://www.soundjay.com/buttons/sounds/button-4.mp3"></audio>
<audio id="wrongSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3"></audio>
<audio id="clickSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3"></audio>

<div class="game-container">
<h1>🧩 Puzzle Game</h1>

<div class="stage-info" id="stageInfo"></div>
<div class="timer">Time Left: <span id="timer">10</span>s</div>

<div id="gameScreen">
    <div class="question-text" id="question"></div>
    <button class="option-button" data-answer="A"></button>
    <button class="option-button" data-answer="B"></button>
    <div class="feedback" id="feedback"></div>
</div>

<div id="gameOverScreen" class="hidden">
    <h2>Game Over</h2>
    <p id="gameOverText"></p>
    <button class="option-button" onclick="restartGame()">Restart Stage</button>
</div>

<button class="download-btn" onclick="downloadGame()">💾 Download Game</button>

</div>

let currentStage = parseInt(localStorage.getItem("savedStage")) || 0;
let timer;
let timeLeft = 10;
let answered = false;

const stageInfo = document.getElementById("stageInfo");
const timerEl = document.getElementById("timer");
const questionEl = document.getElementById("question");
const buttons = document.querySelectorAll(".option-button[data-answer]");
const feedback = document.getElementById("feedback");
const gameScreen = document.getElementById("gameScreen");
const gameOverScreen = document.getElementById("gameOverScreen");
const gameOverText = document.getElementById("gameOverText");
const bgMusic = document.getElementById("bgMusic");
const correctSound = document.getElementById("correctSound");
const wrongSound = document.getElementById("wrongSound");
const clickSound = document.getElementById("clickSound");

// --- SPEAK FUNCTION ---
function speak(text){
    const utter = new SpeechSynthesisUtterance(text);
    utter.voice = speechSynthesis.getVoices().find(v=>v.lang.includes("en") && v.name.includes("Female")) || speechSynthesis.getVoices()[0];
    utter.rate = 0.9;
    speechSynthesis.speak(utter);
}

// --- LOAD STAGE ---
function loadStage(){
    clearInterval(timer);
    answered=false;
    timeLeft=10;
    feedback.style.display="none";
    buttons.forEach(b=>{
        b.disabled=false;
        b.style.background="#ff6b6b";
    });

    const q = questions[currentStage];
    stageInfo.textContent = `Stage ${q.stage} of ${questions.length} (${q.topic})`;
    questionEl.textContent = q.question;

    buttons[0].textContent = "A. " + q.options.A;
    buttons[1].textContent = "B. " + q.options.B;

    speak(q.question); // --- SPEAK THE QUESTION ---
    localStorage.setItem("savedStage", currentStage);
    startTimer();
}

// --- TIMER ---
function startTimer(){
    timerEl.textContent=timeLeft;
    timer=setInterval(()=>{
        timeLeft--;
        timerEl.textContent=timeLeft;
        if(timeLeft<=0){
            clearInterval(timer);
            failStage("⏳ Time Up!");
        }
    },1000);
}

// --- CHECK ANSWER ---
function checkAnswer(e){
    if(answered) return;
    answered=true;
    clearInterval(timer);

    const selected=e.target.dataset.answer;
    const correct=questions[currentStage].correct;

    buttons.forEach(b=>b.disabled=true);
    feedback.style.display="block";

    if(selected===correct){
        feedback.textContent="✅ Correct!";
        feedback.className="feedback correct";
        e.target.style.background="#2ed573";
        correctSound.play();

        setTimeout(()=>{
            currentStage++;
            localStorage.setItem("savedStage",currentStage);
            if(currentStage>=questions.length){
                gameOverText.textContent="🎉 You completed all stages!";
                gameScreen.classList.add("hidden");
                gameOverScreen.classList.remove("hidden");
            }else{
                loadStage();
            }
        },1200);
    }else{
        e.target.style.background="#ff4757";
        wrongSound.play();
        failStage("❌ Wrong Answer!");
    }
}

// --- FAIL STAGE ---
function failStage(msg){
    feedback.textContent=msg;
    feedback.className="feedback incorrect";

    setTimeout(()=>{
        gameScreen.classList.add("hidden");
        gameOverScreen.classList.remove("hidden");
        gameOverText.textContent=`You failed at Stage ${questions[currentStage].stage}`;
    },1200);
}

// --- RESTART ---
function restartGame(){
    gameOverScreen.classList.add("hidden");
    gameScreen.classList.remove("hidden");
    loadStage(); 
}

// --- BUTTON CLICK SOUND ---
buttons.forEach(b=>{
    b.addEventListener("click",()=>{
        clickSound.play();
    });
});
document.querySelector(".download-btn").addEventListener("click",()=>{
    clickSound.play();
});

// --- EVENT LISTENERS ---
buttons.forEach(b=>b.addEventListener("click",checkAnswer));

loadStage();

// --- DOWNLOAD GAME ---
function downloadGame(){
    const content = document.documentElement.outerHTML;
    const blob = new Blob([content], {type: "text/html"});
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "gamemt.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
